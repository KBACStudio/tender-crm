services:
  db:
    image: postgres:16-alpine
    container_name: technical-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      POSTGRES_DB: ${POSTGRES_DB:-technical_crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-technical_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: technical-crm-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app_password@db:5432/technical_crm?schema=public}
      DIRECT_URL: ${DIRECT_URL:-postgresql://app:app_password@db:5432/technical_crm?schema=public}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      COLLABORA_URL: ${COLLABORA_URL:-http://localhost:9980}
      WOPI_BASE_URL: ${WOPI_BASE_URL:-http://app:3000}
      WOPI_SECRET: ${WOPI_SECRET:-dev-wopi-secret}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules

  collabora:
    image: collabora/code:latest
    container_name: technical-crm-collabora
    restart: unless-stopped
    environment:
      domain: ${COLLABORA_DOMAIN:-localhost}
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD:-admin}
      extra_params: --o:ssl.enable=false --o:welcome.enable=false
    cap_add:
      - MKNOD
    ports:
      - "9980:9980"

volumes:
  postgres_data:
